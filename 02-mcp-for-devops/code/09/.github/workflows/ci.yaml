name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ["03", "04", "06", "07", "08"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: 02-mcp-for-devops/code/${{ matrix.module }}/go.sum
      - name: vet
        working-directory: 02-mcp-for-devops/code/${{ matrix.module }}
        run: go vet ./...
      - name: test
        working-directory: 02-mcp-for-devops/code/${{ matrix.module }}
        run: go test -race ./...

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: lint chart
        run: helm lint 02-mcp-for-devops/code/09/deploy/helm/k8s-mcp-server

  docker:
    runs-on: ubuntu-latest
    needs: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build
        uses: docker/build-push-action@v6
        with:
          context: 02-mcp-for-devops/code
          file: 02-mcp-for-devops/code/09/Dockerfile
          push: false
          tags: k8s-mcp-server:ci
