name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: 02-mcp-for-devops/code
          file: 02-mcp-for-devops/code/09/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/k8s-mcp-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/k8s-mcp-server:latest
          provenance: true
          sbom: true

  chart:
    runs-on: ubuntu-latest
    needs: [image]
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: package chart
        run: |
          helm package 02-mcp-for-devops/code/09/deploy/helm/k8s-mcp-server \
            --version "${GITHUB_REF_NAME#v}" \
            --app-version "${GITHUB_REF_NAME#v}" \
            --destination .charts
      - name: push chart to ghcr
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          helm push .charts/k8s-mcp-server-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
