image:
  repository: ghcr.io/devops-ai-guidelines/k8s-mcp-server
  tag: ""    # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

replicaCount: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2

service:
  type: ClusterIP
  metricsPort: 9090

serviceMonitor:
  enabled: true
  interval: 30s

networkPolicy:
  enabled: true
  allowedNamespaces:
    - mcp-clients

rbac:
  create: true
  # Permissions for the MCP server to read cluster state. Tighten per env.
  rules:
    - apiGroups: [""]
      resources: ["pods", "services", "configmaps", "events", "namespaces"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments", "statefulsets", "replicasets"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["deployments/scale"]
      verbs: ["update", "patch"]

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

extraEnv: []
nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: k8s-mcp-server
